<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900" role="img" aria-label="Portrait placeholder">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#003660"/>
      <stop offset="0.55" stop-color="#001845"/>
      <stop offset="1" stop-color="#ffb81c"/>
    </linearGradient>
    <radialGradient id="r" cx="35%" cy="30%" r="65%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="900" rx="190" fill="url(#g)"/>
  <rect width="900" height="900" rx="190" fill="url(#r)"/>
  <text x="50%" y="52%" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="46" font-weight="800" fill="#ffffff" opacity="0.92">
    Replace with your photo
  </text>
  <text x="50%" y="58.5%" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22" font-weight="600" fill="#ffffff" opacity="0.78">
    Put a JPG/PNG/WebP in public/images/
  </text>
</svg>
